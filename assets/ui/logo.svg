<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <!-- Chart bars (ascending) -->
  <rect x="16"  y="114" width="18" height="32" fill="#1e4a7a" rx="2"/>
  <rect x="40"  y="94"  width="18" height="52" fill="#245a8f" rx="2"/>
  <rect x="64"  y="70"  width="18" height="76" fill="#2b6aaa" rx="2"/>
  <rect x="88"  y="48"  width="18" height="98" fill="#3278c0" rx="2"/>
  <rect x="112" y="26"  width="18" height="120" fill="#4a90d9" rx="2"/>

  <!-- Arrow tip above last bar -->
