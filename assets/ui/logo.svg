  <!-- Vertical separator -->
  <line x1="154" y1="8" x2="154" y2="152" stroke="#2c2c2c" stroke-width="1.5"/>

  <!-- SEED -->
  <text x="170" y="86"
        font-family="'Courier New', Courier, monospace"
        font-size="72" font-weight="700"
        fill="#ebebeb"
