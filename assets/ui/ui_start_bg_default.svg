<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- Base background -->
  <rect width="1920" height="1080" fill="#0D0D10"/>

  <!-- Subtle grid lines (horizontal) -->
  <g stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="135" x2="1920" y2="135"/>
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="405" x2="1920" y2="405"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="675" x2="1920" y2="675"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
    <line x1="0" y1="945" x2="1920" y2="945"/>
  </g>

  <!-- Subtle grid lines (vertical) -->
  <g stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1">
    <line x1="192" y1="0" x2="192" y2="1080"/>
    <line x1="384" y1="0" x2="384" y2="1080"/>
    <line x1="576" y1="0" x2="576" y2="1080"/>
    <line x1="768" y1="0" x2="768" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1152" y1="0" x2="1152" y2="1080"/>
    <line x1="1344" y1="0" x2="1344" y2="1080"/>
    <line x1="1536" y1="0" x2="1536" y2="1080"/>
    <line x1="1728" y1="0" x2="1728" y2="1080"/>
  </g>

  <!-- Candlestick skeleton pattern — scattered, low opacity -->
  <!-- Group 1: left cluster -->
  <g fill-opacity="0.03" stroke-opacity="0.05" stroke-width="1">
    <!-- Bullish candles (red in KRX) -->
    <rect x="180" y="600" width="18" height="60" fill="#EB3833" stroke="#EB3833"/>
    <line x1="189" y1="570" x2="189" y2="600" stroke="#EB3833"/>
    <line x1="189" y1="660" x2="189" y2="690" stroke="#EB3833"/>

    <rect x="220" y="560" width="18" height="80" fill="#EB3833" stroke="#EB3833"/>
    <line x1="229" y1="530" x2="229" y2="560" stroke="#EB3833"/>
    <line x1="229" y1="640" x2="229" y2="670" stroke="#EB3833"/>

    <rect x="260" y="590" width="18" height="50" fill="#EB3833" stroke="#EB3833"/>
    <line x1="269" y1="565" x2="269" y2="590" stroke="#EB3833"/>
    <line x1="269" y1="640" x2="269" y2="660" stroke="#EB3833"/>

    <!-- Bearish candles (blue in KRX) -->
    <rect x="300" y="620" width="18" height="70" fill="#2E6BE6" stroke="#2E6BE6"/>
    <line x1="309" y1="595" x2="309" y2="620" stroke="#2E6BE6"/>
    <line x1="309" y1="690" x2="309" y2="715" stroke="#2E6BE6"/>

    <rect x="340" y="650" width="18" height="55" fill="#2E6BE6" stroke="#2E6BE6"/>
    <line x1="349" y1="625" x2="349" y2="650" stroke="#2E6BE6"/>
    <line x1="349" y1="705" x2="349" y2="730" stroke="#2E6BE6"/>

    <rect x="380" y="620" width="18" height="65" fill="#EB3833" stroke="#EB3833"/>
    <line x1="389" y1="595" x2="389" y2="620" stroke="#EB3833"/>
    <line x1="389" y1="685" x2="389" y2="710" stroke="#EB3833"/>
  </g>

  <!-- Group 2: right cluster -->
  <g fill-opacity="0.03" stroke-opacity="0.05" stroke-width="1">
    <rect x="1480" y="380" width="18" height="55" fill="#EB3833" stroke="#EB3833"/>
    <line x1="1489" y1="355" x2="1489" y2="380" stroke="#EB3833"/>
    <line x1="1489" y1="435" x2="1489" y2="455" stroke="#EB3833"/>

    <rect x="1520" y="360" width="18" height="70" fill="#EB3833" stroke="#EB3833"/>
    <line x1="1529" y1="335" x2="1529" y2="360" stroke="#EB3833"/>
    <line x1="1529" y1="430" x2="1529" y2="455" stroke="#EB3833"/>

    <rect x="1560" y="390" width="18" height="60" fill="#2E6BE6" stroke="#2E6BE6"/>
    <line x1="1569" y1="365" x2="1569" y2="390" stroke="#2E6BE6"/>
    <line x1="1569" y1="450" x2="1569" y2="475" stroke="#2E6BE6"/>

    <rect x="1600" y="410" width="18" height="65" fill="#2E6BE6" stroke="#2E6BE6"/>
    <line x1="1609" y1="385" x2="1609" y2="410" stroke="#2E6BE6"/>
    <line x1="1609" y1="475" x2="1609" y2="500" stroke="#2E6BE6"/>

    <rect x="1640" y="385" width="18" height="80" fill="#EB3833" stroke="#EB3833"/>
    <line x1="1649" y1="355" x2="1649" y2="385" stroke="#EB3833"/>
    <line x1="1649" y1="465" x2="1649" y2="490" stroke="#EB3833"/>

    <rect x="1680" y="365" width="18" height="70" fill="#EB3833" stroke="#EB3833"/>
    <line x1="1689" y1="340" x2="1689" y2="365" stroke="#EB3833"/>
    <line x1="1689" y1="435" x2="1689" y2="460" stroke="#EB3833"/>
  </g>

  <!-- Group 3: top-left ghost chart, very faint -->
  <g fill-opacity="0.02" stroke-opacity="0.03" stroke-width="1">
    <rect x="60" y="200" width="14" height="40" fill="#EB3833" stroke="#EB3833"/>
    <line x1="67" y1="182" x2="67" y2="200" stroke="#EB3833"/>
    <line x1="67" y1="240" x2="67" y2="258" stroke="#EB3833"/>

    <rect x="84" y="215" width="14" height="35" fill="#2E6BE6" stroke="#2E6BE6"/>
    <line x1="91" y1="198" x2="91" y2="215" stroke="#2E6BE6"/>
    <line x1="91" y1="250" x2="91" y2="265" stroke="#2E6BE6"/>

    <rect x="108" y="205" width="14" height="45" fill="#EB3833" stroke="#EB3833"/>
    <line x1="115" y1="188" x2="115" y2="205" stroke="#EB3833"/>
    <line x1="115" y1="250" x2="115" y2="268" stroke="#EB3833"/>

    <rect x="132" y="195" width="14" height="50" fill="#EB3833" stroke="#EB3833"/>
    <line x1="139" y1="178" x2="139" y2="195" stroke="#EB3833"/>
    <line x1="139" y1="245" x2="139" y2="262" stroke="#EB3833"/>
  </g>

  <!-- Center vignette: slightly lighter in center for logo focus -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#1A1A1F" stop-opacity="0.0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
