# ─── FORMULAS ────────────────────────────────────────────────────────────────

formulas:
  - name: buy_cost
    status: active
    source: design/gdd/trading-fees.md
    referenced_by:
      - design/gdd/trading-fees.md
      - design/gdd/order-engine.md
    expression: "quantity × price × (1 + buy_tax + commission)"
    variables:
      - quantity
      - price
      - buy_tax       # KR=0.0, market_config.json
      - commission    # KR=0.00015, market_config.json
    output_range: [1, unlimited]
    notes: "매수 체결 시 예수금에서 차감하는 실제 금액. buy_tax+commission 합산."
    added: "2026-04-23"
    revised: ""

  - name: net_proceeds
    status: active
    source: design/gdd/trading-fees.md
    referenced_by:
      - design/gdd/trading-fees.md
      - design/gdd/order-engine.md
    expression: "gross × (1 - sell_tax - commission) - capital_gains"
    variables:
      - gross           # = quantity × price
      - sell_tax        # KR=0.002
      - commission      # KR=0.00015
      - capital_gains   # KR=0 (short/long rate=0.0)
    output_range: [0, unlimited]
    notes: "매도 체결 시 예수금에 입금되는 실제 수령액."
    added: "2026-04-23"
    revised: ""

  - name: margin_ratio
    status: active
    source: design/gdd/short-selling.md
    referenced_by:
      - design/gdd/short-selling.md
      - design/gdd/stop-loss-take-profit.md
      - design/gdd/leverage-trading.md
    expression: "(margin_deposited + unrealized_pnl) / initial_value"
    variables:
      - margin_deposited  # 개시 시 예수금 차감액
      - unrealized_pnl    # (open_price - current_price) × quantity
      - initial_value     # = open_price × quantity (숏 포지션 기준 가치)
    output_range: [0.0, unlimited]
    notes: "margin_call_threshold(0.20) 미만 시 강제청산. short-selling.md 소유."
    added: "2026-04-23"
    revised: ""

  - name: account_total_value
    status: active
    source: design/gdd/currency-system.md
    referenced_by:
      - design/gdd/currency-system.md
      - design/gdd/season-manager.md
      - design/gdd/portfolio-manager.md
      - design/gdd/ai-competitor.md
    expression: "sim_cash + portfolio_value"
    variables:
      - sim_cash        # CurrencySystem.sim_cash
      - portfolio_value # PortfolioManager.get_total_value()
    output_range: [0, unlimited]
    notes: "시즌 중 리그 랭킹 기준값. tangible_assets(부동산 등) 제외."
    added: "2026-04-23"
    revised: ""

  - name: PER_display
    status: active
    source: design/gdd/financial-statements.md
    referenced_by:
      - design/gdd/financial-statements.md
      - design/gdd/financial-report-system.md
    expression: "base_per × (current_price / season_start_price)"
    variables:
      - base_per            # StockData.per (JSON 기준값, FinancialReportSystem이 갱신)
      - current_price       # PriceEngine._stock_states[id].current_price
      - season_start_price  # PriceEngine._stock_states[id].open_price
    output_range: [0.0, 200.0]
    notes: "FinancialReportSystem이 base_per를 덮어쓸 때 표시값이 단계적으로 변화 — 의도된 동작."
    added: "2026-04-23"
    revised: ""

  - name: borrow_fee_daily
    status: active
    source: design/gdd/short-selling.md
    referenced_by:
      - design/gdd/short-selling.md
    expression: "open_price × quantity × BORROW_FEE_RATE_DAILY"
    variables:
      - open_price              # ShortPosition.open_price
      - quantity                # ShortPosition.quantity
      - BORROW_FEE_RATE_DAILY   # 0.0003
    output_range: [0, unlimited]
    notes: "매 장 마감(on_market_close) 시 sim_cash에서 차감."
    added: "2026-04-23"
    revised: ""

  - name: season_xp_total
    status: active
    source: design/gdd/xp-system.md
    referenced_by:
      - design/gdd/xp-system.md
      - design/gdd/season-manager.md
    expression: "BASE_SEASON_XP + rank_bonus + return_bonus + completion_bonus"
    variables:
      - BASE_SEASON_XP    # 200
      - rank_bonus        # RANK_XP_TABLE[final_rank]: 1위 500, 6위+ 50
      - return_bonus      # floor(max(0, season_return_pct) × RETURN_XP_SCALE)
      - completion_bonus  # 20 if (return_pct>=0 AND trades>=MIN_TRADES_FOR_RANK) else 0
    output_range: [200, 1200]
    notes: "시즌 종료 시 SeasonManager → XPSystem.grant_season_bonus() 호출."
    added: "2026-04-23"
    revised: ""

  - name: daily_xp
    status: active
    source: design/gdd/xp-system.md
    referenced_by:
      - design/gdd/xp-system.md
      - design/gdd/season-manager.md
    expression: "floor(BASE_DAILY_XP × daily_alpha_multiplier(alpha_pct)) × FREE_MARKET_XP_RATE"
    variables:
      - BASE_DAILY_XP           # 30
      - alpha_pct               # 당일 수익률 - 시장 수익률
      - FREE_MARKET_XP_RATE     # 1.00 (프리마켓도 패널티 없음)
    output_range: [15, 90]
    notes: "매 거래일 종료 시 GameClock.on_day_end → XPSystem.grant_daily_bonus()."
    added: "2026-04-23"
    revised: ""

  - name: tier_assignment
    status: active
    source: design/gdd/season-manager.md
    referenced_by:
      - design/gdd/season-manager.md
      - design/gdd/currency-system.md
      - design/gdd/ai-competitor.md
    expression: "TIER_THRESHOLD[T] ≤ cash_assets < TIER_THRESHOLD[T+1]"
    variables:
      - cash_assets       # CurrencySystem.cash_assets (시즌 시작 버튼 시점)
      - TIER_THRESHOLD    # 브론즈 1M ~ 거장 100B (season-manager.md §3-2 테이블)
    output_range: ["브론즈", "거장"]
    notes: "시즌 시작 버튼 시점에 1회 판정. 시즌 중 자산 변화로 티어 변동 없음."
    added: "2026-04-23"
    revised: ""


